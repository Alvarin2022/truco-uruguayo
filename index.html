<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truco Uruguayo — Anotador</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --celeste: #5B9BD5;
      --celeste-dark: #2A6099;
      --celeste-light: #D6E8F8;
      --gold: #C8960C;
      --gold-light: #F5C518;
      --white: #FAFAFA;
      --cream: #F5F0E8;
      --text: #1a1a1a;
      --text-muted: #555;
      --malas-bg: #7F1D1D;
      --malas-text: #FCA5A5;
      --buenas-bg: #14532D;
      --buenas-text: #86EFAC;
      --sep: #CBD5E1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--celeste-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== HEADER / BANDERA ===== */
    header {
      width: 100%;
      background: var(--white);
      border-bottom: 3px solid var(--celeste);
      padding: 0;
      overflow: hidden;
    }

    .bandera {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .franja {
      width: 100%;
      height: 14px;
    }

    .franja:nth-child(odd)  { background: var(--celeste); }
    .franja:nth-child(even) { background: var(--white); }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 18px 24px 10px;
      background: var(--white);
      position: relative;
    }

    .sol-uru {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--celeste-dark);
      line-height: 1.1;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 0;
      background: var(--white);
      border-bottom: 2px solid var(--celeste-light);
      width: 100%;
      justify-content: center;
      padding: 0 16px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -2px;
      letter-spacing: 0.5px;
    }

    .tab-btn.active {
      color: var(--celeste-dark);
      border-bottom-color: var(--celeste-dark);
    }

    .tab-btn:hover:not(.active) { color: var(--celeste); }

    /* ===== MAIN CONTENT ===== */
    main { width: 100%; max-width: 620px; padding: 20px 12px 40px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== SCOREBOARD ===== */
    .boards-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 8px;
      align-items: start;
    }

    .board-card {
      background: var(--white);
      border: 1.5px solid var(--celeste);
      border-radius: 14px;
      padding: 14px 10px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(91,155,213,0.10);
    }

    .team-label {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--celeste-dark);
      text-align: center;
    }

    .score-num {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      color: var(--text);
      line-height: 1;
      min-width: 60px;
      text-align: center;
    }

    .section-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .malas-badge { background: var(--malas-bg); color: var(--malas-text); }
    .buenas-badge { background: var(--buenas-bg); color: var(--buenas-text); }

    .tally-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .tally-row {
      display: flex;
      gap: 2px;
      justify-content: center;
      align-items: center;
      height: 26px;
    }

    .tally-box {
      width: 24px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section-sep {
      width: 90%;
      height: 1px;
      background: var(--sep);
      margin: 2px 0;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      width: 100%;
    }

    .btn-add {
      background: var(--celeste-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-add:hover { background: var(--celeste); }
    .btn-add:active { transform: scale(0.96); }

    .btn-sub {
      background: transparent;
      color: var(--celeste-dark);
      border: 1.5px solid var(--celeste);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .btn-sub:hover { background: var(--celeste-light); }

    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-top: 70px;
    }

    .vs-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--celeste);
      font-weight: 700;
    }

    .btn-reset {
      background: transparent;
      border: 1.5px solid var(--celeste);
      color: var(--celeste-dark);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.15s;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .btn-reset:hover { background: var(--celeste-light); }

    .winner-banner {
      background: var(--celeste-dark);
      color: #fff;
      border-radius: 12px;
      padding: 14px 24px;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      text-align: center;
      width: 100%;
      margin-top: 14px;
      display: none;
    }

    .winner-banner.show { display: block; }

    /* ===== REGLAMENTO ===== */
    .regla-search {
      width: 100%;
      border: 1.5px solid var(--celeste);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      margin-bottom: 16px;
      outline: none;
    }

    .regla-search:focus { border-color: var(--celeste-dark); }

    .regla-section {
      background: var(--white);
      border: 1px solid var(--celeste-light);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .regla-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      background: var(--white);
      transition: background 0.15s;
    }

    .regla-header:hover { background: var(--celeste-light); }

    .regla-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .regla-icon {
      width: 28px;
      height: 28px;
      background: var(--celeste-light);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .regla-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--celeste-dark);
    }

    .regla-chevron {
      font-size: 12px;
      color: var(--celeste);
      transition: transform 0.2s;
    }

    .regla-chevron.open { transform: rotate(180deg); }

    .regla-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--celeste-light);
    }

    .regla-body.open { display: block; }

    .regla-body p {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.75;
      margin-top: 12px;
    }

    .regla-body ul {
      margin-top: 10px;
      padding-left: 18px;
    }

    .regla-body li {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 4px;
    }

    .regla-body strong { color: var(--celeste-dark); }

    .tag {
      display: inline-block;
      background: var(--celeste-light);
      color: var(--celeste-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    .tag-pts {
      background: #FEF9C3;
      color: #713F12;
    }

    .no-results {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 32px 0;
      display: none;
    }

    /* ===== FOOTER ===== */
    footer {
      width: 100%;
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      border-top: 1px solid var(--celeste-light);
      background: var(--white);
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <!-- Sol de Mayo Uruguay -->
    <svg class="sol-uru" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="14" fill="#C8960C"/>
      <!-- rayos alternados largos y cortos -->
      <g stroke="#C8960C" stroke-linecap="round">
        <!-- rayos largos -->
        <line x1="32" y1="4"  x2="32" y2="13" stroke-width="3"/>
        <line x1="32" y1="51" x2="32" y2="60" stroke-width="3"/>
        <line x1="4"  y1="32" x2="13" y2="32" stroke-width="3"/>
        <line x1="51" y1="32" x2="60" y2="32" stroke-width="3"/>
        <line x1="11.5" y1="11.5" x2="18" y2="18" stroke-width="3"/>
        <line x1="46" y1="46"   x2="52.5" y2="52.5" stroke-width="3"/>
        <line x1="52.5" y1="11.5" x2="46" y2="18" stroke-width="3"/>
        <line x1="18" y1="46"   x2="11.5" y2="52.5" stroke-width="3"/>
        <!-- rayos cortos (intermedios) -->
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(22.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(67.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(112.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(157.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(202.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(247.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(292.5 32 32)"/>
        <line x1="32" y1="7"  x2="32" y2="11" stroke-width="1.5" transform="rotate(337.5 32 32)"/>
      </g>
      <!-- cara del sol -->
      <circle cx="27" cy="29" r="2" fill="#fff"/>
      <circle cx="37" cy="29" r="2" fill="#fff"/>
      <path d="M26 36 Q32 41 38 36" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M25 26 Q27 24 29 26" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M35 26 Q37 24 39 26" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <div class="header-text">
      <h1>Truco Uruguayo</h1>
      <p>Anotador — 30 puntos</p>
    </div>
  </div>
  <!-- Franjas celestes y blancas de la bandera -->
  <div class="bandera">
    <div class="franja"></div>
    <div class="franja"></div>
    <div class="franja"></div>
    <div class="franja"></div>
    <div class="franja"></div>
    <div class="franja"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('anotador', this)">Anotador</button>
  <button class="tab-btn" onclick="switchTab('reglamento', this)">Reglamento</button>
</div>

<main>

  <!-- === ANOTADOR === -->
  <div class="tab-panel active" id="tab-anotador">

    <div class="winner-banner" id="winner-banner">Ganaron!</div>

    <div class="boards-row">
      <div class="board-card">
        <div class="team-label">Nosotros</div>
        <div class="score-num" id="score-nos">0</div>
        <div class="section-badge malas-badge">Las malas</div>
        <div class="tally-grid" id="tally-nos-malas"></div>
        <div class="section-sep"></div>
        <div class="section-badge buenas-badge">Las buenas</div>
        <div class="tally-grid" id="tally-nos-buenas"></div>
        <div class="btn-row">
          <button class="btn-sub" onclick="addPoint('nos', -1)">−</button>
          <button class="btn-add" onclick="addPoint('nos', 1)">+ Punto</button>
        </div>
      </div>

      <div class="center-col">
        <div class="vs-text">vs</div>
        <button class="btn-reset" onclick="resetGame()">Reiniciar</button>
      </div>

      <div class="board-card">
        <div class="team-label">Ellos</div>
        <div class="score-num" id="score-ell">0</div>
        <div class="section-badge malas-badge">Las malas</div>
        <div class="tally-grid" id="tally-ell-malas"></div>
        <div class="section-sep"></div>
        <div class="section-badge buenas-badge">Las buenas</div>
        <div class="tally-grid" id="tally-ell-buenas"></div>
        <div class="btn-row">
          <button class="btn-sub" onclick="addPoint('ell', -1)">−</button>
          <button class="btn-add" onclick="addPoint('ell', 1)">+ Punto</button>
        </div>
      </div>
    </div>
  </div>

  <!-- === REGLAMENTO === -->
  <div class="tab-panel" id="tab-reglamento">

    <input type="text" class="regla-search" id="regla-search" placeholder="Buscar regla... ej: flor, envido, muestra" oninput="filtrarReglas()"/>

    <div id="reglas-lista"></div>
    <div class="no-results" id="no-results">No se encontraron reglas para esa búsqueda.</div>
  </div>

</main>

<footer>Truco Uruguayo &mdash; Hecho con orgullo oriental &bull; Reglas basadas en Wikipedia &amp; Ludoteka</footer>

<script>
/* =================== ANOTADOR =================== */
let pts = { nos: 0, ell: 0 };
const MAX = 30, HALF = 15;

function addPoint(team, delta) {
  const banner = document.getElementById('winner-banner');
  if (banner.classList.contains('show') && delta > 0) return;
  pts[team] = Math.max(0, Math.min(MAX, pts[team] + delta));
  render();
}

function resetGame() {
  pts = { nos: 0, ell: 0 };
  document.getElementById('winner-banner').classList.remove('show');
  render();
}

function makeTallyRows(container, count, max) {
  container.innerHTML = '';
  const numRows = Math.ceil(max / 5);
  const rows = [];
  for (let i = 0; i < numRows; i++) {
    const row = document.createElement('div');
    row.className = 'tally-row';
    rows.push(row);
    container.appendChild(row);
  }
  for (let i = 0; i < max; i++) {
    const rowIdx = Math.floor(i / 5);
    const posInGroup = i % 5;
    const filled = i < count;
    const wrap = document.createElement('div');
    wrap.className = 'tally-box';
    wrap.innerHTML = makePalit(posInGroup, filled);
    rows[rowIdx].appendChild(wrap);
  }
}

function makePalit(pos, filled) {
  const stroke = filled ? '#2A6099' : '#CBD5E1';
  const w = 22, h = 26;
  if (pos < 4) {
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <line x1="11" y1="2" x2="11" y2="24" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`;
  } else {
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <line x1="2" y1="2" x2="20" y2="24" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`;
  }
}

function render() {
  for (const team of ['nos', 'ell']) {
    const p = pts[team];
    document.getElementById('score-' + team).textContent = p;
    const malasPts = Math.min(p, HALF);
    const buenasPts = Math.max(0, p - HALF);
    makeTallyRows(document.getElementById('tally-' + team + '-malas'), malasPts, HALF);
    makeTallyRows(document.getElementById('tally-' + team + '-buenas'), buenasPts, HALF);
  }
  const banner = document.getElementById('winner-banner');
  if (pts.nos >= MAX && pts.ell >= MAX) {
    banner.textContent = 'Empate — vuelvan a jugar!';
    banner.classList.add('show');
  } else if (pts.nos >= MAX) {
    banner.textContent = '¡Ganaron Nosotros! ¡Arriba!';
    banner.classList.add('show');
  } else if (pts.ell >= MAX) {
    banner.textContent = '¡Ganaron Ellos! ¡La revancha!';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

render();

/* =================== TABS =================== */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

/* =================== REGLAMENTO =================== */
const REGLAS = [
  {
    icon: '🃏',
    titulo: 'El mazo y la muestra',
    tags: ['baraja', 'muestra', 'base'],
    contenido: `
      <p>Se juega con la <strong>baraja española de 40 cartas</strong>, sin ochos, nueves ni comodines. Cada jugador recibe <strong>3 cartas</strong> al inicio de cada mano.</p>
      <p>Al terminar el reparto, se levanta una carta del mazo y se coloca boca arriba: esa es <strong>la muestra</strong>. El palo de la muestra define cuáles son las <em>piezas</em> de esa mano, las cartas más poderosas.</p>
      <p>La muestra se coloca parcialmente bajo el mazo, apuntando al jugador de la derecha, que es quien <strong>empieza a jugar</strong>.</p>
    `
  },
  {
    icon: '👑',
    titulo: 'Las piezas — jerarquía de cartas',
    tags: ['piezas', 'jerarquía', 'muestra', 'valor'],
    contenido: `
      <p>Las <strong>piezas</strong> son las cartas del palo de la muestra, y son las más fuertes del juego. En orden de mayor a menor valor:</p>
      <ul>
        <li><strong>2 de la muestra</strong> — la más alta (vale 30 en envido)</li>
        <li><strong>4 de la muestra</strong> — segunda (vale 29)</li>
        <li><strong>5 de la muestra</strong> — tercera (vale 28)</li>
        <li><strong>Caballo (11) de la muestra</strong> — cuarta (vale 27)</li>
        <li><strong>Sota (10) de la muestra</strong> — quinta (vale 27)</li>
      </ul>
      <p>Si alguna de esas cartas <em>es</em> la muestra, el <strong>Rey (12)</strong> del mismo palo ocupa su lugar.</p>
      <p>Por debajo de las piezas están las <em>matas</em>: el 3, el 2 (no muestra), el 1 de espada, el 1 de basto, y el 7 de espada/oros según corresponda.</p>
    `
  },
  {
    icon: '⚔️',
    titulo: 'El truco — cómo se juega',
    tags: ['truco', 'bazas', 'manos', 'rondas'],
    contenido: `
      <p>Cada mano se disputa en <strong>hasta 3 rondas</strong> (bazas). En cada baza, los jugadores tiran una carta y gana quien tire la más alta según la jerarquía.</p>
      <p>El equipo que gana <strong>2 de 3 rondas</strong> gana la mano y se lleva los puntos del truco.</p>
      <ul>
        <li>Si hay empate en una baza (<em>baza parda</em>), gana quien haya ganado la baza anterior.</li>
        <li>Si las 3 bazas son pardas, gana <strong>quien tiene la mano</strong>.</li>
        <li>Si un equipo gana las primeras 2 bazas, la tercera no se juega.</li>
        <li>Un jugador puede <strong>irse al mazo</strong> si no quiere disputar la mano.</li>
      </ul>
    `
  },
  {
    icon: '📣',
    titulo: 'Las apuestas del truco',
    tags: ['truco', 'retruco', 'vale 4', 'apuestas', 'puntos'],
    contenido: `
      <p>Durante la mano, cualquier jugador puede subir la apuesta. El rival puede <strong>aceptar (quiero)</strong> o <strong>rechazar (no quiero)</strong>.</p>
      <ul>
        <li><span class="tag tag-pts">1 pto</span> Ganar la mano sin apostar</li>
        <li><span class="tag tag-pts">2 ptos</span> <strong>Truco</strong> — el primero que canta "truco"</li>
        <li><span class="tag tag-pts">3 ptos</span> <strong>Retruco</strong> — el rival sube la apuesta</li>
        <li><span class="tag tag-pts">4 ptos</span> <strong>Vale 4</strong> — la apuesta máxima del truco</li>
      </ul>
      <p>Si alguien dice "no quiero", el que cantó gana los puntos del nivel anterior.</p>

function renderReglas(lista) {
  const cont = document.getElementById('reglas-lista');
  const noRes = document.getElementById('no-results');
  cont.innerHTML = '';
  if (lista.length === 0) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  lista.forEach((r, idx) => {
    const sec = document.createElement('div');
    sec.className = 'regla-section';
    sec.innerHTML = `
      <div class="regla-header" onclick="toggleRegla(this)">
        <div class="regla-header-left">
          <div class="regla-icon">${r.icon}</div>
          <div class="regla-title">${r.titulo}</div>
        </div>
        <div class="regla-chevron">▼</div>
      </div>
      <div class="regla-body">${r.contenido}</div>
    `;
    cont.appendChild(sec);
  });
}

function toggleRegla(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.regla-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

function filtrarReglas() {
  const q = document.getElementById('regla-search').value.toLowerCase().trim();
  if (!q) { renderReglas(REGLAS); return; }
  const filtradas = REGLAS.filter(r =>
    r.titulo.toLowerCase().includes(q) ||
    r.tags.some(t => t.includes(q)) ||
    r.contenido.toLowerCase().includes(q)
  );
  renderReglas(filtradas);
}

renderReglas(REGLAS);
